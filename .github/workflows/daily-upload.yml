name: Daily Meta Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "13 9 * * *" # KST 18:13

jobs:
  run-meta-automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DRY_RUN: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pygooglenews depends on feedparser 5.x, which still needs setuptools' legacy use_2to3 support.
          pip install "setuptools<58" wheel
          pip install --no-build-isolation -r requirements.txt

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}" >> .env
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> .env
          echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}" >> .env
          echo "R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}" >> .env
          echo "R2_PUBLIC_BASE_URL=${{ secrets.R2_PUBLIC_BASE_URL }}" >> .env
          echo "META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}" >> .env
          echo "IG_USER_ID=${{ secrets.IG_USER_ID }}" >> .env
          echo "FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}" >> .env
          echo "FACEBOOK_PAGE_ACCESS_TOKEN=${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}" >> .env
          echo "MAX_DAILY_POSTS=3" >> .env
          echo "UPLOAD_WINDOW_MINUTES=0" >> .env
          echo "POST_SPACING_MINUTES=0" >> .env

      - name: Run automation
        run: python main.py

      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-automation-outputs
          path: outputs/

      - name: Commit history update
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f history.jsonl ]; then
            git add -f history.jsonl
            git commit -m "Update publish history" || echo "No history changes"
            git push
          else
            echo "No history.jsonl file to commit"
          fi

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Meta Automation ${{ job.status }} - Run #${{ github.run_number }}"
          to: ${{ secrets.REPORT_EMAIL_TO }}
          from: Meta Automation <${{ secrets.SMTP_USERNAME }}>
          body: |
            Workflow: Daily Meta Automation
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}


